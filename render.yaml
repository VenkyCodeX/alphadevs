services:
  - type: web
    name: alphadevs
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_RECEIVER
        sync: false
      - key: FRONTEND_URL_PROD
        value: https://alphadevs.in
      - key: ADMIN_SECRET
        sync: false
