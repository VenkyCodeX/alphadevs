<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaDevs Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }

    /* LOGIN */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #151515; border: 1px solid #2a2a2a; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-box h2 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(135deg,#00d4ff,#7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-box p  { color: #a0a0a0; font-size: 14px; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 14px 18px; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; color: #fff; font-size: 15px; margin-bottom: 16px; outline: none;
      font-family: inherit;
    }
    .login-box input:focus { border-color: #00d4ff; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: linear-gradient(135deg,#00d4ff,#7c3aed);
      color: #0a0a0a; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 700; cursor: pointer; width: 100%; justify-content: center;
      font-family: inherit; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-danger {
      background: linear-gradient(135deg,#ef4444,#dc2626);
      color: #fff; padding: 8px 16px; font-size: 12px; width: auto;
    }
    .btn-toggle {
      background: linear-gradient(135deg,#10b981,#059669);
      color: #fff; padding: 8px 16px; font-size: 12px; width: auto;
    }
    .btn-toggle.unapproved { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; }

    /* ADMIN PANEL */
    #adminPanel { display: none; padding: 30px 20px; max-width: 900px; margin: 0 auto; }

    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 30px; flex-wrap: wrap; gap: 16px;
    }
    .admin-header h1 { font-size: 24px; background: linear-gradient(135deg,#00d4ff,#7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .admin-header span { color: #a0a0a0; font-size: 13px; }

    .stats-bar {
      display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .stat-pill {
      padding: 10px 20px; background: #151515; border: 1px solid #2a2a2a;
      border-radius: 30px; font-size: 13px; color: #a0a0a0;
    }
    .stat-pill span { color: #00d4ff; font-weight: 700; }

    .review-card {
      background: #151515; border: 1px solid #2a2a2a; border-radius: 14px;
      padding: 22px 24px; margin-bottom: 16px; transition: border-color 0.2s;
    }
    .review-card:hover { border-color: #3a3a3a; }
    .review-card.unapproved { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.03); }

    .review-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .review-author { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 42px; height: 42px; background: linear-gradient(135deg,#00d4ff,#7c3aed);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #0a0a0a; flex-shrink: 0;
    }
    .review-name { font-size: 15px; font-weight: 600; }
    .review-role { font-size: 12px; color: #a0a0a0; margin-top: 2px; }
    .review-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .stars { color: #ffd700; font-size: 13px; margin-bottom: 10px; }
    .review-msg { font-size: 14px; color: #c0c0c0; line-height: 1.7; font-style: italic; }
    .review-date { font-size: 11px; color: #555; margin-top: 10px; }

    .empty { text-align: center; padding: 60px 0; color: #555; font-size: 15px; }
    .logout-btn {
      background: none; border: 1px solid #2a2a2a; color: #a0a0a0;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
      font-family: inherit; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; margin-left: 8px;
    }
    .badge.approved { background: rgba(16,185,129,0.15); color: #10b981; }
    .badge.pending  { background: rgba(245,158,11,0.15);  color: #f59e0b; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>α AlphaDevs</h2>
      <p>Admin Panel — Reviews Manager</p>
      <input type="password" id="passwordInput" placeholder="Enter admin password" />
      <button class="btn" onclick="login()">
        <i class="fa-solid fa-lock-open"></i> Login
      </button>
      <p class="error-msg" id="loginError"></p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <div class="admin-header">
      <div>
        <h1>α Reviews Manager</h1>
        <span id="reviewCount">Loading...</span>
      </div>
      <button class="logout-btn" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>

    <div class="stats-bar" id="statsBar"></div>
    <div id="reviewsList"></div>
  </div>

  <script>
    const API = 'https://alphadevs.onrender.com/api/admin';
    let adminToken = '';

    // Auto-login if token saved
    window.onload = () => {
      const saved = sessionStorage.getItem('adminToken');
      if (saved) { adminToken = saved; showPanel(); }
      document.getElementById('passwordInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
      });
    };

    async function login() {
      const pass = document.getElementById('passwordInput').value.trim();
      if (!pass) return;
      adminToken = pass;
      try {
        const res  = await fetch(`${API}/reviews`, { headers: { 'x-admin-token': adminToken } });
        const data = await res.json();
        if (!data.success) throw new Error('Wrong password');
        sessionStorage.setItem('adminToken', adminToken);
        showPanel(data.data);
      } catch {
        document.getElementById('loginError').textContent = 'Wrong password. Try again.';
        adminToken = '';
      }
    }

    function logout() {
      sessionStorage.removeItem('adminToken');
      adminToken = '';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
    }

    async function showPanel(reviews) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      if (!reviews) {
        const res  = await fetch(`${API}/reviews`, { headers: { 'x-admin-token': adminToken } });
        const data = await res.json();
        reviews = data.data || [];
      }
      renderReviews(reviews);
    }

    function renderReviews(reviews) {
      const total    = reviews.length;
      const approved = reviews.filter(r => r.approved).length;
      const avgRating = total ? (reviews.reduce((s,r) => s + r.rating, 0) / total).toFixed(1) : 0;

      document.getElementById('reviewCount').textContent = `${total} total review${total !== 1 ? 's' : ''}`;
      document.getElementById('statsBar').innerHTML = `
        <div class="stat-pill">Total <span>${total}</span></div>
        <div class="stat-pill">Approved <span>${approved}</span></div>
        <div class="stat-pill">Hidden <span>${total - approved}</span></div>
        <div class="stat-pill">Avg Rating <span>${avgRating} ⭐</span></div>
      `;

      if (!total) {
        document.getElementById('reviewsList').innerHTML = '<div class="empty"><i class="fa-regular fa-comment-dots" style="font-size:40px;display:block;margin-bottom:16px;"></i>No reviews yet.</div>';
        return;
      }

      document.getElementById('reviewsList').innerHTML = reviews.map(r => {
        const initials = r.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
        const stars    = Array.from({length:5},(_,i) => `<i class="fa-${i < r.rating ? 'solid' : 'regular'} fa-star"></i>`).join('');
        const date     = new Date(r.createdAt).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
        return `
          <div class="review-card ${r.approved ? '' : 'unapproved'}" id="card-${r._id}">
            <div class="review-top">
              <div class="review-author">
                <div class="avatar">${initials}</div>
                <div>
                  <div class="review-name">${r.name} <span class="badge ${r.approved ? 'approved' : 'pending'}">${r.approved ? 'Visible' : 'Hidden'}</span></div>
                  <div class="review-role">${r.role}</div>
                </div>
              </div>
              <div class="review-actions">
                <button class="btn btn-toggle ${r.approved ? '' : 'unapproved'}" onclick="toggleReview('${r._id}', this)">
                  <i class="fa-solid fa-eye${r.approved ? '-slash' : ''}"></i> ${r.approved ? 'Hide' : 'Show'}
                </button>
                <button class="btn btn-danger" onclick="deleteReview('${r._id}')">
                  <i class="fa-solid fa-trash"></i> Delete
                </button>
              </div>
            </div>
            <div class="stars">${stars}</div>
            <div class="review-msg">"${r.message}"</div>
            <div class="review-date">${date}</div>
          </div>`;
      }).join('');
    }

    async function deleteReview(id) {
      if (!confirm('Delete this review permanently?')) return;
      const res  = await fetch(`${API}/reviews/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-token': adminToken }
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById(`card-${id}`).remove();
        showPanel();
      }
    }

    async function toggleReview(id, btn) {
      const res  = await fetch(`${API}/reviews/${id}/toggle`, {
        method: 'PATCH',
        headers: { 'x-admin-token': adminToken }
      });
      const data = await res.json();
      if (data.success) showPanel();
    }
  </script>
</body>
</html>
