<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | AlphaDevs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>α</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --color-dark: #0a0a0a;
      --color-text: #ffffff;
      --color-text-muted: #a0a0a0;
      --color-primary: #00d4ff;
      --color-secondary: #7c3aed;
      --gradient-primary: linear-gradient(135deg, #00d4ff, #7c3aed);
    }
    body {
      background: var(--color-dark);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      opacity: 0.12;
    }
    .orb1 { width: 500px; height: 500px; background: #00d4ff; top: -100px; left: -100px; }
    .orb2 { width: 400px; height: 400px; background: #7c3aed; bottom: -100px; right: -100px; }
    .content { position: relative; z-index: 1; max-width: 560px; }
    .error-code {
      font-size: clamp(100px, 20vw, 160px);
      font-weight: 800;
      line-height: 1;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .error-icon {
      font-size: 48px;
      margin-bottom: 24px;
      color: var(--color-primary);
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; color: var(--color-text-muted); line-height: 1.7; margin-bottom: 40px; }
    .actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--gradient-primary);
      color: #0a0a0a;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,212,255,0.3); }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: transparent;
      color: var(--color-text);
      border: 2px solid var(--color-primary);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover { background: var(--color-primary); color: #0a0a0a; transform: translateY(-3px); }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 40px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="content">
    <a href="index.html" class="logo">αAlphaDevs</a>
    <div class="error-code">404</div>
    <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="actions">
      <a href="index.html" class="btn-primary">
        <i class="fa-solid fa-house"></i> Back to Home
      </a>
      <a href="index.html#contact" class="btn-secondary">
        <i class="fa-solid fa-paper-plane"></i> Contact Me
      </a>
    </div>
  </div>
</body>
</html>
